name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared deps
        uses: actions/checkout@v4
        with:
          repository: fortunto2/rust-code
          path: shared/rust-code
          token: ${{ secrets.GH_PAT }}

      - name: Symlink shared deps
        run: |
          mkdir -p ../../shared
          ln -s "$GITHUB_WORKSPACE/shared/rust-code" ../../shared/rust-code

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/supervox dist/
          cd dist
          tar czf supervox-${{ matrix.target }}.tar.gz supervox
          shasum -a 256 supervox-${{ matrix.target }}.tar.gz > supervox-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supervox-${{ matrix.target }}
          path: dist/supervox-${{ matrix.target }}.tar.gz*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            supervox-*.tar.gz
            supervox-*.sha256

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHA256=$(cat supervox-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          URL="https://github.com/fortunto2/supervox/releases/download/${VERSION}/supervox-aarch64-apple-darwin.tar.gz"

          cat > /tmp/supervox.rb <<EOF
          class Supervox < Formula
            desc "Voice-powered productivity TUI — live call assistant + post-call analysis + agent chat"
            homepage "https://github.com/fortunto2/supervox"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              on_arm do
                url "${URL}"
                sha256 "${SHA256}"
              end
            end

            def install
              bin.install "supervox"
            end

            test do
              assert_match "supervox", shell_output("#{bin}/supervox --version")
            end
          end
          EOF

          # Get current file SHA for update
          FILE_SHA=$(gh api repos/fortunto2/homebrew-tap/contents/Formula/supervox.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/fortunto2/homebrew-tap/contents/Formula/supervox.rb \
              -X PUT \
              -f message="bump supervox to ${VERSION}" \
              -f content="$(base64 -w0 /tmp/supervox.rb)" \
              -f sha="$FILE_SHA"
          else
            gh api repos/fortunto2/homebrew-tap/contents/Formula/supervox.rb \
              -X PUT \
              -f message="feat: add supervox ${VERSION}" \
              -f content="$(base64 -w0 /tmp/supervox.rb)"
          fi
